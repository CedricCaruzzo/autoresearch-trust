name: verify-integrity

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install trust package
        # Installs only the trust layer — no PyTorch or CUDA needed.
        # The trust package depends only on Python stdlib (hashlib, hmac, json, sqlite3).
        run: pip install -e ".[trust-dev]"

      - name: Run trust tests
        run: pytest tests/ --tb=short -v
